name: Release desktop installers

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release view "$TAG_NAME" >/dev/null 2>&1 || \
            gh release create "$TAG_NAME" \
              --title "PaiM $TAG_NAME" \
              --notes "macOS와 Windows 설치 파일입니다." \
              --verify-tag

  build-installers:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install desktop dependencies
        run: npm ci --prefix desktop

      - name: Build and upload installers
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tauriScript: npm run tauri
          tagName: ${{ github.ref_name }}
          releaseName: "PaiM ${{ github.ref_name }}"
          releaseBody: "macOS와 Windows 설치 파일입니다."
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: false
          releaseAssetNamePattern: "PaiM-[version]-[platform]-[arch][setup][ext]"
          args: ${{ matrix.args }}
