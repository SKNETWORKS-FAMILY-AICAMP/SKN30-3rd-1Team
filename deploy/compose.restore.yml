# 복구 리허설 override — 백업본을 빈 볼륨에 되살려 검증할 때 쓴다.
#
# deploy/stack.sh restore ... 로만 실행한다.
#
# rehearsal과 별도 project여야 하는 이유: 같은 project에 복구하면 원본 볼륨을
# 재사용하게 되어 "빈 대상에 복구가 실제로 되는가"를 검증하지 못한다. 백업
# source는 rehearsal, 복구 대상은 restore로 나눈다.
#
# env 파일도 분리한다. "다른 키로는 복호화가 실패하는가"를 확인하려면
# SESSION_MEMORY_KEY가 다른 파일이 필요한데, 루트 .env나 리허설 파일을 고쳐
# 검증하면 원본 설정을 훼손한다.
name: paim-restore

services:
  backend:
    # `!override`가 없으면 base의 `.env`와 병합되어 루트 값이 샌다.
    # 경로는 프로젝트 디렉터리(리포지토리 루트) 기준이다 — compose.rehearsal.yml 주석 참조.
    env_file: !override
      - deploy/.env.restore

  caddy:
    environment:
      # 복구 리허설도 로컬 HTTP 고정. 운영 .env를 복사해 만들 때 PAIM_DOMAIN이
      # 딸려오면 실도메인 TLS 사이트로 떠서 로컬 검증이 불가능해진다.
      PAIM_DOMAIN: ":80"

# 포트는 deploy/.env.restore의 PAIM_HTTP_PORT·PAIM_HTTPS_PORT로 옮긴다.
# 이유는 compose.rehearsal.yml 주석 참조(ports 시퀀스는 병합된다).
